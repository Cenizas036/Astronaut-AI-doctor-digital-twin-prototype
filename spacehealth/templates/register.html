<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ORBIT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a2e 50%, #16213e 100%);
            color: white; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%,100%{opacity:0.3;}50%{opacity:1;} }

        .form-container {
            position: relative; z-index: 2;
            background: rgba(255,255,255,0.05);
            border: 2px solid #00d4ff;
            padding: 2rem; border-radius: 15px;
            width: 100%; max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }

        h1 {
            text-align: center; margin-bottom: 1.5rem;
            background: linear-gradient(45deg,#00d4ff,#7c3aed,#ff6b6b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input {
            padding: 0.8rem; border-radius: 8px;
            border: none; outline: none;
            background: rgba(255,255,255,0.1); color: white;
        }
        input::placeholder { color: #ccc; }
        button {
            padding: 0.8rem; border: none; border-radius: 8px;
            background: #00d4ff; color: #0c0c1e;
            font-weight: bold; cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: #7c3aed; color: white; }
        .footer-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .footer-link a { color: #ff6b6b; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="form-container">
        <h1>Join ORBIT</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign Up</button>
        </form>
        <div class="footer-link">
            Already registered? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>

    <script>
        // ⭐ Generate stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random()*100 + '%';
                star.style.top = Math.random()*100 + '%';
                const size = Math.random()*3+1;
                star.style.width = size+'px';
                star.style.height = size+'px';
                starsContainer.appendChild(star);
            }
        }
        document.addEventListener('DOMContentLoaded', createStars);

        // 🔊 Narrator (on signup page load)
        document.addEventListener("DOMContentLoaded", function() {
            if ("speechSynthesis" in window) {
                const welcomeMessage = "Welcome aboard astronaut. Your ORBIT journey begins now.";
                const speech = new SpeechSynthesisUtterance(welcomeMessage);
                speech.pitch = 1;
                speech.rate = 1;
                speech.volume = 1;
                speech.voice = speechSynthesis.getVoices().find(v => v.name.includes("Female")) || speechSynthesis.getVoices()[0];
                setTimeout(() => { speechSynthesis.speak(speech); }, 500);
            }
        });
    </script>
</body>
</html>
