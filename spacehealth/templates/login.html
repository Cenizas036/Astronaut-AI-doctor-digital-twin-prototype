<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ORBIT</title>
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a2e 50%, #16213e 100%);
            color: white; min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ✅ Logo styling */
        .orbit-logo {
            position: relative; z-index: 2;
            margin-bottom: 1rem;
            text-align: center;
        }
        .orbit-logo img {
            height: 80px;
            filter: drop-shadow(0 0 10px rgba(0,212,255,0.7));
            transition: transform 0.3s ease;
        }
        .orbit-logo img:hover {
            transform: scale(1.05);
        }

        .form-container {
            position: relative; z-index: 2;
            background: rgba(255,255,255,0.05);
            border: 2px solid #ff6b6b;
            padding: 2rem; border-radius: 15px;
            width: 100%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(255,107,107,0.3);
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }

        h1 {
            text-align: center; margin-bottom: 1.5rem;
            background: linear-gradient(45deg,#ff6b6b,#7c3aed,#00d4ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input {
            padding: 0.8rem; border-radius: 8px;
            border: none; outline: none;
            background: rgba(255,255,255,0.1); color: white;
        }
        input::placeholder { color: #ccc; }
        button {
            padding: 0.8rem; border: none; border-radius: 8px;
            background: #ff6b6b; color: #0c0c1e;
            font-weight: bold; cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: #7c3aed; color: white; }
        .footer-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .footer-link a { color: #00d4ff; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <!-- ✅ Logo -->
    <div class="orbit-logo">
        <img src="{% static 'images/logo.png' %}" alt="ORBIT Logo">
    </div>

    <div class="form-container">
        <h1>Welcome Back</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <div class="footer-link">
            Don’t have an account? <a href="{% url 'register' %}">Sign Up</a>
        </div>
    </div>

    <script>
        // ⭐ Generate stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random()*100 + '%';
                star.style.top = Math.random()*100 + '%';
                const size = Math.random()*3+1;
                star.style.width = size+'px';
                star.style.height = size+'px';
                starsContainer.appendChild(star);
            }
        }
        document.addEventListener('DOMContentLoaded', createStars);

        // 🔊 Narrator (on successful login page load)
        document.addEventListener("DOMContentLoaded", function() {
            if ("speechSynthesis" in window) {
                const welcomeMessage = "Welcome back, astronaut. ORBIT system is ready for your mission.";
                const speech = new SpeechSynthesisUtterance(welcomeMessage);
                speech.pitch = 1;
                speech.rate = 1;
                speech.volume = 1;
                speech.voice = speechSynthesis.getVoices().find(v => 
                    v.name.toLowerCase().includes("female") ||
                    v.name.toLowerCase().includes("zira") ||
                    v.name.toLowerCase().includes("samantha") ||
                    v.name.toLowerCase().includes("google uk english female")
                ) || speechSynthesis.getVoices()[0];
                setTimeout(() => { speechSynthesis.speak(speech); }, 500);
            }
        });
    </script>
</body>
</html>
