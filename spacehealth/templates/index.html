<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIT - Astronaut Digital Twin Health Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .stars {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .star:nth-child(odd) { animation-delay: 1s; }
        .star:nth-child(3n) { animation-delay: 2s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            position: relative; z-index: 2;
            min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
        }

        .header { text-align: center; margin-top: 2rem; }

        .title {
            font-size: 4rem; font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7c3aed, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            margin-bottom: 1rem;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .tagline {
            font-size: 1.2rem; color: #a0a0a0;
            max-width: 600px; line-height: 1.6;
            margin: 0 auto;
        }

        .main-content {
            display: flex; flex-direction: column;
            align-items: center; gap: 2rem;
            flex-grow: 1; justify-content: center;
            animation: float 6s ease-in-out infinite;
        }

        .buttons-container {
            display: flex; gap: 2rem;
            flex-wrap: wrap; justify-content: center;
        }

        .orbit-button {
            padding: 1.5rem 3rem; font-size: 1.3rem;
            font-weight: bold;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
            min-width: 250px;
            text-align: center;
        }

        .orbit-button::before {
            content: ''; position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .orbit-button:hover::before { left: 100%; }

        .orbit-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
            background: rgba(0, 212, 255, 0.2);
            border-color: #ffffff;
            color: #ffffff;
        }

        .orbit-button.admin {
            border-color: #ff6b6b; color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .orbit-button.admin:hover {
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            background: rgba(255, 107, 107, 0.2);
            border-color: #ffffff; color: #ffffff;
        }

        .footer { text-align: center; color: #666; font-size: 0.9rem; margin-top: 2rem; }

        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .tagline { font-size: 1rem; padding: 0 1rem; }
            .buttons-container { flex-direction: column; gap: 1.5rem; }
            .orbit-button { padding: 1.2rem 2rem; font-size: 1.1rem; min-width: 200px; }
            .container { padding: 1rem; }
        }

        @media (max-width: 480px) {
            .title { font-size: 2rem; }
            .orbit-button { padding: 1rem 1.5rem; font-size: 1rem; min-width: 180px; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <header class="header">
            <h1 class="title">ORBIT</h1>
            <p class="tagline">Astronaut Digital Twin Health Prediction & Astro Buddy</p>
        </header>

        <main class="main-content">
            <div class="buttons-container">
                <!-- ✅ These now work with Django auth + register view -->
                <a href="{% url 'login' %}" class="orbit-button astronaut">Login</a>
                <a href="{% url 'register' %}" class="orbit-button admin">Sign Up</a>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2025 Orbit | Smart India Hackathon Project</p>
        </footer>
    </div>

    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 100;
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }
        document.addEventListener('DOMContentLoaded', createStars);
    </script>
</body>
</html>
